# megapowers model catalog: what orchestrates, what models exist, what each is for.
# Last reviewed: 2026-07-23 (model IDs age; scripts/check-freshness.sh guards this date).
# Edit an OVERRIDE LAYER, not this shipped file: a project .megapowers/models.toml or
# user ~/.config/megapowers/models.toml wins per key and survives plugin updates.
# Two identical copies ship (plugins/megapowers/models.toml and
# plugins/mega-orchestration/models.toml) because plugins cannot locate each other
# at runtime; scripts/validate.sh fails on any drift between them.
# Consumers: the megapowers SessionStart hook renders this into every session's
# context (hooks/render-model-catalog), and mega-orchestration's delegate-resolve
# and delegate-resolve reads it for lead, tiers, providers, and floor.
# Routing (roles, fallbacks, presets) stays in the multi-agent-delegation skill's
# delegates.toml. Provider sections written in delegates.toml layers (pre-0.3
# style) still parse and WIN over this catalog, so old override files keep working.

# --- Lead: what orchestrates ---
# delegate-resolve --lead prints it. Artifact reviews use --author-vendor rather
# than assuming the lead authored the artifact.
[lead]
provider = "codex"
tier     = "frontier"

# --- Tiers: the vendor-neutral capability scale, weakest first ---
[tiers]
scale = ["fast", "strong", "frontier"]

# What each tier is for. The session-start block teaches this to every session,
# including native subagent model choice.
[tiers.use]
fast     = "mechanical fan-out, bulk reads, cheap transcription"
strong   = "default implementer and reviewer; the ship floor"
frontier = "lead, judge, verify, hard design calls"

# --- Efforts: the vendor-neutral spend scale, weakest first ---
# The floor's effort half (tier:effort) and each provider's default `effort`
# speak this scale; a provider's `efforts` array lists the subset it accepts.
[efforts]
scale = ["low", "medium", "high", "xhigh", "max"]

[efforts.use]
low    = "mechanical steps, relays, latency-sensitive work"
medium = "routine implementation, cost-sensitive runs"
high   = "delegate default: reviews, verification, primary work"
xhigh  = "lead default; hardest agentic and judge work"
max    = "correctness over cost; no shipped provider allows it"

# --- Providers: how to reach each backend ---
# `binary` is the CLI delegate-resolve probes with `command -v`. `reference` names
# the channel-mechanics file, resolved relative to the multi-agent-delegation skill
# directory (the reference files ship with that skill). `detect` remains legacy
# catalog metadata; Stop-hook approval is based on a current structured receipt,
# never a transcript marker. `use` is shown in the session block.
[providers.codex]
effort  = "xhigh"  # lead default model_reasoning_effort; small scoped impl may run lower (see templates/codex-agents/)
efforts = ["low", "medium", "high", "xhigh"]   # never max
vendor  = "openai"
binary  = "codex"
channel = "native-or-plugin-or-mcp-or-cli"
default_tier = "frontier"
capabilities = ["code", "vision", "computer_use"]
detect  = ["mcp__codex__codex", "codex exec", "codex-companion.mjs review", "codex-companion.mjs adversarial-review"]
reference = "references/providers/codex.md"
use     = "lead: orchestration, code review, small impl, computer use"
notes   = "Native subagents inside Codex; codex-plugin-cc from Claude Code; codex exec / SDK / codex mcp-server elsewhere. Channel mechanics: see the reference file."

[providers.codex.tiers]
frontier = "gpt-5.6-sol"
strong   = "gpt-5.6-terra"
fast     = "gpt-5.6-luna"

# Second model vendor, so the cross-vendor roles have a real different-vendor route
# when the lead (or an --exclude) rules out the primary.
[providers.claude]
vendor  = "anthropic"
effort  = "high"   # intended ceiling for Claude verify/judge; lead-vendor xhigh does not pass through
efforts = ["low", "medium", "high"]
binary  = "claude"
channel = "claude-cli"
default_tier = "frontier"
capabilities = ["code", "vision", "computer_use"]
detect  = ["claude -p"]
reference = "references/providers/claude.md"
use     = "planning buddy plus independent plan review, verification, and judging"
notes   = "One-shot headless Claude: --bare with API keys, disposable config/cwd with OAuth; independent reviews declare every author vendor."

# Frontier only by policy: sonnet and haiku are never routed; anything claude
# does runs fable.
[providers.claude.tiers]
frontier = "claude-fable-5"
strong   = "claude-fable-5"

# --- Defaults: cross-cutting rules ---
[defaults]
# Minimum tier:effort for anything that ships, on the global scales. A provider
# whose default_tier or declared default effort sits below the corresponding
# floor is skipped at resolution. Providers without an effort use the tier only.
# Wrapper agents relaying to an external CLI inherit the session model
# (`model: inherit`); relay fidelity is worth the spend.
floor = "strong:low"
