# megapowers model catalog: what orchestrates, what models exist, what each is for.
# Last reviewed: 2026-07-12 (model IDs age; scripts/check-freshness.sh guards this date).
# Edit an OVERRIDE LAYER, not this shipped file: a project .megapowers/models.toml or
# user ~/.config/megapowers/models.toml wins per key and survives plugin updates.
# Two identical copies ship (plugins/megapowers/models.toml and
# plugins/mega-orchestration/models.toml) because plugins cannot locate each other
# at runtime; scripts/validate.sh fails on any drift between them.
# Consumers: the megapowers SessionStart hook renders this into every session's
# context (hooks/render-model-catalog), and mega-orchestration's delegate-resolve
# and delegate-nudge read it for lead, tiers, providers, floor, and detect markers.
# Routing (roles, fallbacks, presets) stays in the multi-agent-delegation skill's
# delegates.toml. Provider sections written in delegates.toml layers (pre-0.3
# style) still parse and WIN over this catalog, so old override files keep working.

# --- Lead: what orchestrates ---
# delegate-resolve --lead prints it; --exclude-lead resolves a role away from the
# lead's vendor. Swap the lead in an override layer; prose never hardcodes it.
[lead]
provider = "claude"
tier     = "frontier"

# --- Tiers: the vendor-neutral capability scale, weakest first ---
[tiers]
scale = ["fast", "strong", "frontier"]

# What each tier is for. The session-start block teaches this to every session,
# including native subagent model choice.
[tiers.use]
fast     = "mechanical fan-out, bulk reads, cheap transcription"
strong   = "default implementer and reviewer; the ship floor"
frontier = "lead, judge, verify, hard design calls"

# --- Providers: how to reach each backend ---
# `binary` is the CLI delegate-resolve probes with `command -v`. `reference` names
# the channel-mechanics file, resolved relative to the multi-agent-delegation skill
# directory (the reference files ship with that skill). `detect` lists transcript
# markers of review-capable delegate invocations; the delegate-nudge hook suppresses
# its nudge when one appears (mcp__ entries match tool-use name fields, entries with
# spaces match Bash command fields). Entries from disabled providers still count:
# it is a fail-open heuristic, not a grant. `use` is the one-line purpose shown in
# the always-loaded session block.
[providers.codex]
effort  = "high"   # default model_reasoning_effort on dispatch; verify/judge roles may spend higher (see templates/codex-agents/)
vendor  = "openai"
binary  = "codex"
channel = "native-or-mcp-or-cli"
default_tier = "frontier"
capabilities = ["code", "vision", "computer_use"]
detect  = ["mcp__codex__codex", "codex exec"]
reference = "references/providers/codex.md"
use     = "plan/code review, small impl, computer use (cheap frontier)"
notes   = "Native Codex subagents inside Codex; codex exec / SDK / codex mcp-server from elsewhere. Channel mechanics and sandbox-auth caveats: see the reference file."

[providers.codex.tiers]
frontier = "gpt-5.6-sol"

# Second model vendor, so the cross-vendor roles have a real different-vendor route
# when the lead (or an --exclude) rules out the primary.
[providers.claude]
vendor  = "anthropic"
binary  = "claude"
channel = "claude-cli"
default_tier = "frontier"
capabilities = ["code", "vision", "computer_use"]
detect  = ["claude -p"]
reference = "references/providers/claude.md"
use     = "native subagents when Claude leads; cross-vendor pass otherwise"
notes   = "Headless `claude -p <prompt>`; the different-vendor route when a non-Anthropic model leads (resolve with --exclude-lead)."

[providers.claude.tiers]
frontier = "claude-fable-5"
strong   = "claude-sonnet-5"
fast     = "claude-haiku-4-5-20251001"

# Browser / visual verification and fallback: drive the UI with playwright-cli and
# reason over the screenshots with a vision-capable model. Depends only on a
# standalone CLI, not on any single vendor's browser agent.
[providers.browser]
vendor  = "none"
binary  = "playwright-cli"
channel = "playwright-cli"
capabilities = ["computer_use", "vision"]
reference = "references/providers/browser.md"
use     = "visual verify: playwright-cli plus a vision-capable reader"
notes   = "capture -> reason-over-screenshot -> act loop; screenshots saved to .megapowers/evidence/. See agents/browser-delegate.md."

# Alternative browser/visual backend, disabled by default. Verify your local `agy`
# automation path and approval behavior before enabling. Bench check 2026-07-04:
# Gemini 3.1 Pro trails on computer-use benchmarks, so there is no performance case
# for enabling it either; re-check before flipping.
[providers.antigravity]
model   = "configured-in-agy"
vendor  = "google"
binary  = "agy"
channel = "agy-cli"
detect  = ["agy exec", "agy run"]
enabled = false

# --- Defaults: cross-cutting rules ---
[defaults]
# Minimum tier:effort for anything that ships, on the [tiers] scale. A provider
# whose default_tier sits below the floor tier is skipped at resolution.
# Exception: wrapper agents relaying to an external CLI run strong:medium, a
# faithful self-contained prompt is worth the extra effort.
floor = "strong:low"
