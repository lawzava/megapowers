# Minimal ~/.codex/config.toml baseline for using Codex with megapowers.
# Copy only the keys you want into ~/.codex/config.toml.
# Last reviewed: 2026-07-14 (Codex ships roughly weekly; scripts/check-freshness.sh
# flags this file once the date is older than its review window).

# Pin the model to the catalog's codex frontier tier (models.toml [providers.codex.tiers])
# so a Codex lead runs the model the catalog declares; keep it in sync when the catalog
# moves. Comment it out to let Codex choose its own default instead.
model = "gpt-5.6-sol"

# Reasoning depth. Matches the codex provider's xhigh lead default in models.toml;
# drop to "high" for latency-sensitive delegate use. Never "max" by policy.
model_reasoning_effort = "xhigh"

# Named profiles are separate `$CODEX_HOME/<name>.config.toml` files, not
# `[profiles.*]` tables here. `templates/codex-complex.config.toml` is the
# optional Sol ultra layer for deliberate complex work.

# Sandbox: allow writes within the workspace (needed for build/apply roles).
sandbox_mode = "workspace-write"

# Ask before actions that fall outside the sandbox policy.
approval_policy = "on-request"

# This baseline deliberately opts into the under-development v2 collaboration
# surface. V2 rejects the v1 `agents.max_threads` key. Its session-thread cap
# includes the root, so 11 total threads permits up to 10 concurrent subagents.
[features.multi_agent_v2]
enabled = true
max_concurrent_threads_per_session = 11
multi_agent_mode_hint_text = """
Use subagents only when the user or applicable AGENTS.md or skill instructions explicitly authorize delegation. The root agent owns spawning by default; workers spawn only in a deliberately designed coordinator workflow with isolated artifact ownership. Keep each ordinary batch to at most six workers so the root retains capacity for integration and recovery, even though the session cap is higher.

For independent workers, pass fork_turns = "none" and make the brief self-contained. Use a small positive fork_turns count only when specific recent turns are essential. Use fork_turns = "all" only for a true same-context continuation, never as a convenience default.

The root owns integration of the final target. In an explicitly selected recursive coordinator workflow, each coordinator alone integrates its subtree, each writing child uses its assigned branch and linked worktree, and the parent receives one final result per child coordinator. Do not finish gating work until all required workers have returned and their outputs have been reviewed and independently validated. Completed workers remain idle; send a follow-up only for the same assignment, start a fresh worker for a new problem, and interrupt only running workers.

Treat the canonical task path as the nesting counter. If it already has five task-name components beneath /root, do not spawn another subagent; continue locally or report the limit.
"""

# Cross-runtime Codex channel mechanics live in mega-orchestration's
# references/providers/codex.md. A Codex lead uses native subagents directly.
