name: ci

# Enforce the suite's own quality gates on every push/PR: structural validation
# (manifests, skill frontmatter, cross-references, hook wiring, hook tests,
# context-budget guards, and the security-lint marker scan, all run by
# scripts/validate.sh) plus the eval harness (deterministic + mock-agent
# scenarios), a gitleaks secret scan, and the native Claude Code manifest
# validator. The validate/eval core is portable bash + Go stdlib with no secrets;
# the secret scan and manifest validator are the only steps that pull an action
# or a CLI, both pinned/guarded below.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install deps (jq, shellcheck)
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          # no go.mod: the eval harness is Go stdlib run via `go run`, so the
          # v6 default dependency cache has nothing to key on and only warns
          cache: false

      # scripts/validate.sh runs scripts/security-lint.sh itself, so the secret
      # marker scan is covered here with no separate step (no double run).
      - name: Structural validation
        run: scripts/validate.sh

      - name: Eval suite (deterministic + mock agent)
        run: bash evals/run-all.sh

      - name: Eval scorecard
        if: always()
        run: |
          bash evals/run-all.sh --json results.jsonl || true
          go run evals/score.go results.jsonl

  secret-scan:
    # Full-history secret scan with gitleaks. gitleaks-action is pinned to the
    # v3.0.0 commit SHA (released 2026-05-30); this repo is under a personal
    # account, so no GITLEAKS_LICENSE is required. The license var is passed
    # through anyway so the step keeps working if the repo ever moves to an org.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  plugin-validate:
    # Native Claude Code manifest validation: catches plugin/marketplace schema
    # drift our hand-rolled jq checks may miss (`--strict` promotes unrecognized-
    # field warnings to errors). Advisory (continue-on-error) because the claude
    # CLI's headless, no-auth behavior in CI is unverified; promote to a hard gate
    # once a green run confirms it. @anthropic-ai/claude-code installs `claude`.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate marketplace and plugin manifests
        run: |
          claude plugin validate --strict .claude-plugin/marketplace.json
          for d in plugins/*/; do
            claude plugin validate --strict "$d"
          done
